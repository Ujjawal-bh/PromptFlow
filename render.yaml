# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: promptmanager
    runtime: node
    plan: free
    buildCommand: npm ci && npm run render-build
    startCommand: npm run render-start
    # Do NOT set a Release Command that runs prisma/npx — migrations run in render-build.
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
